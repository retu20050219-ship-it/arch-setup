# ===============================
# Kitty — clean & fast
# ===============================



font_family      JetBrainsMono Nerd Font
font_size        11.0

cursor_shape     block
cursor_blink_interval 0.5

window_padding_width 8

background       #1a1b26
foreground       #c0caf5
cursor           #c0caf5
selection_background #4a5899

active_border_color #bb9af7
inactive_border_color #414868

color0  #15161e
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #7aa2f7
color5  #bb9af7
color6  #7dcfff
color7  #a9b1d6

color8  #414868
color9  #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5


background_opacity 0.88

# Make Neovim opaque
map --when-focus-on=vim set_background_opacity 1.0
map --when-focus-on=vim set_background_opacity 0.88



